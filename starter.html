<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library Game</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #6f4e3f;
    font-family: sans-serif;
    gap: 16px;
  }
  canvas {
    border: 1px solid #ffffff;
    border-radius: 16px;
    cursor: crosshair;
    background: url("background.png") center/cover;
    touch-action: none;
  }
  starting-words {
    font-size: 18px;
    color: #fff;
    text-shadow: 0 0 4px rgba(0,0,0,0.5);

  }
  .controls { display: flex; gap: 12px; }
  button {
    padding: 8px 28px;
    font-size: 15px;
    font-color: #ffffff;
    border: 1px solid #555;
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
  }
  button:hover { background: rgba(255,255,255,0.05); }
  #hud { font-size: 15px; min-height: 24px; }
</style>
</head>
<body>

<canvas id="c" width="860" height="660"></canvas>
<div class="controls">
  <button onclick="castSpell()">Cast</button>
  <button onclick="clearDrawing()">Clear</button>
</div>
<div id="hud">Draw the required shape to defeat each enemy!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const bg = new Image();
bg.src = "background.png"; 
const W = 860, H = 660;
const CX = W / 2, CY = H / 2;


//uh we need some sort of like standard character
//and weneed to draw like the evil book

let drawing = false;
let points = [];
let strokes = [];
let playerHP = 100;
let bossFight = false;
let gameOver = false;
let enemies = [];
let spawnTimer = 0;
let spawnInterval = 180;
let wave = 0;

const SHAPES = ['circle', 'square', 'line'];
const SHAPE_COLORS = { circle: '#4A90D9', square: '#C0392B', line: '#9B59B6' };

function spawnEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const r = 320;
  const x = CX + Math.cos(angle) * r;
  const y = CY + Math.sin(angle) * r;
  const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
  const speed = 0.35 + Math.random() * 0.2 + wave * 0.05;
  enemies.push({ x, y, shape, speed, size: 34, hit: 0, dead: false, deadTimer: 0 });
}

function drawEnemyShape(e) {
  const { x, y, size, shape, hit } = e;
  const pulse = hit > 0 ? 1 + Math.sin(hit * 0.4) * 0.18 : 1;
  const s = size * pulse;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = e.dead ? Math.max(0, e.deadTimer / 20) : 1;
  ctx.fillStyle = SHAPE_COLORS[shape];
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;

  if (shape === 'square') {
    ctx.beginPath();
    ctx.roundRect(-s/2, -s/2, s, s, 5);
    ctx.fill(); ctx.stroke();
  } else if (shape === 'circle') {
    ctx.beginPath();
    ctx.arc(0, 0, s/2, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.roundRect(-s/2, -s*0.28, s, s*0.56, 5);
    ctx.fill(); ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(s * 0.32)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const label = shape === 'square' ? '□' : shape === 'circle' ? '○' : '—';
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.fillStyle = '#4A90D9';
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✦', 0, 1);
  ctx.restore();
}

function drawPlayerHPBar() {
  const bw = 200, bh = 16;
  const bx = (W - bw) / 2, by = H - 36;
  ctx.fillStyle = 'rgba(80,80,80,0.4)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 6); ctx.fill();
  const pct = playerHP / 100;
  ctx.fillStyle = playerHP > 50 ? '#27AE60' : playerHP > 25 ? '#E67E22' : '#C0392B';
  ctx.beginPath(); ctx.roundRect(bx, by, bw * pct, bh, 6); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Player HP: ${playerHP}/100`, bx + bw/2, by + 8);
}

function drawBossFight() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 28px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Boss Fight!', W/2, H/2 - 20);
  ctx.font = '18px serif';
  ctx.fillText('Defeat the boss by drawing the correct shape!', W/2, H/2 + 20);
}

function drawHUD() {
  const e = enemies.find(e => !e.dead);
  if (e && !gameOver) {
    const label = e.shape === 'square' ? 'Draw a SQUARE'
      : e.shape === 'circle' ? 'Draw a CIRCLE'
      : 'Draw a HORIZONTAL LINE';
    ctx.fillStyle = SHAPE_COLORS[e.shape];
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(label, W/2, 10);
  }
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Game Over', W/2, H/2 - 20);
    ctx.font = '18px sans-serif';
    ctx.fillText('Refresh to play again', W/2, H/2 + 20);
  }
}

function drawUserStrokes() {
  const all = strokes.flat().concat(points);
  let color = '#4A90D9';
  if (all.length >= 8) {
    if (looksLikeSquare(all) || looksLikeCircle(all) || looksLikeLine(all)) color = '#3BBA4C';
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 3.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  strokes.forEach(s => {
    ctx.beginPath();
    s.forEach((p, i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
  });
  if (points.length > 1) {
    ctx.beginPath();
    points.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  // okay add a timer or some sort of quantifier for the end of this episode because its to long and we haveto go to the net level
  //maybe we should dop three level of difficulty and a miniboss fight 


  if (!gameOver) {
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      wave++;
      spawnEnemy();
      if (spawnInterval > 80) spawnInterval -= 8;
    }

    enemies.forEach(e => {
      if (e.dead) { e.deadTimer--; return; }
      const dx = CX - e.x, dy = CY - e.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 26) {
        playerHP = Math.max(0, playerHP - 20);
        e.dead = true;
        e.deadTimer = 20;
        if (playerHP <= 0) { playerHP = 0; gameOver = true; }
        document.getElementById('hud').textContent = `Enemy reached you! HP: ${playerHP}`;
        return;
      }
      e.x += (dx / dist) * e.speed;
      e.y += (dy / dist) * e.speed;
      if (e.hit > 0) e.hit--;
    });

    enemies = enemies.filter(e => !e.dead || e.deadTimer > 0);
  }

  enemies.forEach(drawEnemyShape);
  drawPlayer();
  drawPlayerHPBar();
  drawUserStrokes();
  drawHUD();

  requestAnimationFrame(loop);
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  if (e.touches) return { x: (e.touches[0].clientX - r.left)*scaleX, y: (e.touches[0].clientY - r.top)*scaleY };
  return { x: (e.clientX - r.left)*scaleX, y: (e.clientY - r.top)*scaleY };
}

canvas.addEventListener('mousedown', e => { drawing=true; points=[getPos(e)]; });
canvas.addEventListener('mousemove', e => { if (!drawing) return; points.push(getPos(e)); });
canvas.addEventListener('mouseup', () => { if (points.length>1) strokes.push([...points]); drawing=false; points=[]; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; points=[getPos(e)]; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; points.push(getPos(e)); });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (points.length>1) strokes.push([...points]); drawing=false; points=[]; });

// Shape detection
function looksLikeSquare(all) {
  if (all.length < 8) return false;
  const xs=all.map(p=>p.x), ys=all.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const w=maxX-minX, h=maxY-minY;
  if (w<30||h<30) return false;
  const ratio=Math.min(w,h)/Math.max(w,h);
  if (ratio<0.55) return false;
  const margin=Math.max(w,h)*0.28;
  const onEdge=all.filter(p=>p.x-minX<margin||maxX-p.x<margin||p.y-minY<margin||maxY-p.y<margin).length;
  if (onEdge/all.length<0.6) return false;
  const first=all[0],last=all[all.length-1];
  return Math.hypot(last.x-first.x,last.y-first.y)<Math.max(w,h)*0.45;
}

function looksLikeCircle(all) {
  if (all.length < 12) return false;
  const xs=all.map(p=>p.x), ys=all.map(p=>p.y);
  const cx=(Math.min(...xs)+Math.max(...xs))/2;
  const cy=(Math.min(...ys)+Math.max(...ys))/2;
  const dists=all.map(p=>Math.hypot(p.x-cx,p.y-cy));
  const avgD=dists.reduce((a,b)=>a+b,0)/dists.length;
  if (avgD<20) return false;
  const variance=dists.reduce((a,b)=>a+Math.abs(b-avgD),0)/dists.length;
  if (variance/avgD>0.38) return false;
  const first=all[0],last=all[all.length-1];
  const closed=Math.hypot(last.x-first.x,last.y-first.y)<avgD*1.1;
  const w=Math.max(...xs)-Math.min(...xs), h=Math.max(...ys)-Math.min(...ys);
  return closed && Math.min(w,h)/Math.max(w,h)>0.5;
}

function looksLikeLine(all) {
  if (all.length < 6) return false;
  const xs=all.map(p=>p.x), ys=all.map(p=>p.y);
  const w=Math.max(...xs)-Math.min(...xs);
  const h=Math.max(...ys)-Math.min(...ys);
  if (w < 60) return false;
  return h/w < 0.35;
}

function castSpell() {
  if (gameOver) return;
  if (strokes.length === 0) { document.getElementById('hud').textContent = 'Draw a shape first!'; return; }
  const all = strokes.flat();
  const sq = looksLikeSquare(all);
  const ci = looksLikeCircle(all);
  const li = looksLikeLine(all);

  let hit = false;
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (e.dead) continue;
    if ((e.shape==='square'&&sq)||(e.shape==='circle'&&ci)||(e.shape==='line'&&li)) {
      e.dead = true;
      e.deadTimer = 20;
      document.getElementById('hud').textContent = 'Enemy defeated!';
      hit = true;
      break;
    }
  }

  if (!hit) {
    const needed = enemies.find(e=>!e.dead);
    const label = needed
      ? (needed.shape==='square'?'Draw a SQUARE':needed.shape==='circle'?'Draw a CIRCLE':'Draw a HORIZONTAL LINE')
      : 'No enemies!';
    document.getElementById('hud').textContent = `Wrong shape! ${label}`;
  }

  clearDrawing();
}

function clearDrawing() {
  strokes = []; points = [];
}

loop();
</script>
</body>
</html>
