  body {

<body>

<canvas id="c" width="620" height="460"></canvas>
<div class="controls">
  <button onclick="check()">Cast</button>
  <button onclick="clear_()">Clear</button>
</div>
<div id="msg">HP: <span id="hp">100</span></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let drawing = false;
let points = [];
let strokes = [];
let hp = 100;

//the function that straght up changes the color for the square
//probably gonna make a lot more of these for different shapes+colors but for now js squre
function getColor() {
  const all = strokes.flat().concat(points);
  if (all.length < 8) return '#4A90D9';
  if (looksLikeSquare(all)) return '#3BBA4C';
  return '#4A90D9';
}

function drawEnemy() {
  const ex = 210, ey = 140, ew = 200, eh = 160;

  // HP bar code
  // just used some mathto channge the color of the bar so yeah
  const barW = 200, barH = 16;
  const bx = ex, by = ey - 30;
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.roundRect(bx, by, barW, barH, 6);
  ctx.fill();
  ctx.fillStyle = hp > 50 ? '#27AE60' : hp > 25 ? '#E67E22' : '#C0392B';
  ctx.beginPath();
  ctx.roundRect(bx, by, barW * (hp / 100), barH, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${hp}/100`, bx + barW / 2, by + 12);

  // Plain square
  ctx.fillStyle = '#C0392B';
  ctx.beginPath();
  ctx.roundRect(ex, ey, ew, eh, 12);
  ctx.fill();
}

function redraw() {
  ctx.clearRect(0, 0, 620, 460);
  drawEnemy();
  const color = getColor();
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  strokes.forEach(s => {
    ctx.beginPath();
    s.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  });
  if (points.length > 1) {
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  }
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('mousedown', e => { drawing = true; points = [getPos(e)]; });
canvas.addEventListener('mousemove', e => { if (!drawing) return; points.push(getPos(e)); redraw(); });
canvas.addEventListener('mouseup', () => { if (points.length > 1) strokes.push([...points]); drawing = false; points = []; redraw(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; points = [getPos(e)]; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; points.push(getPos(e)); redraw(); });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (points.length > 1) strokes.push([...points]); drawing = false; points = []; redraw(); });

// this is the math part for calculating if something is a square guys -- this checks if the shape looks like a square, then chnges the color green.
//its basically checking the points of strokes and where they fit 
// this math is very difficult to code so, for shapes just get it from CHATGPT
function looksLikeSquare(all) {
  if (all.length < 8) return false;
  const xs = all.map(p => p.x), ys = all.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const w = maxX - minX, h = maxY - minY;
  if (w < 30 || h < 30) return false;
  const ratio = Math.min(w, h) / Math.max(w, h);
  if (ratio < 0.6) return false;
  const margin = Math.max(w, h) * 0.25;
  const onEdge = all.filter(p =>
    p.x - minX < margin || maxX - p.x < margin ||
    p.y - minY < margin || maxY - p.y < margin
  ).length;
  if (onEdge / all.length < 0.65) return false;
  const first = all[0], last = all[all.length - 1];
  return Math.hypot(last.x - first.x, last.y - first.y) < Math.max(w, h) * 0.4;
}

function looksLikeTriangle(all) {
  // Placeholder for triangle detection logic
  return false;
}

function looksLikeCircle(all) {
  // Placeholder for circle detection logic
  return false;
}
//calling the detectSquare function calls the looks square function so yeah
function detectSquare(strokes) {
  return looksLikeSquare(strokes.flat());
}

function check() {
  if (strokes.length === 0) { document.getElementById('msg').textContent = 'Draw something first!'; return; }
  if (detectSquare(strokes)) {
    hp = Math.max(0, hp - 20);
    if (hp <= 0) {
      document.getElementById('msg').textContent = 'Enemy defeated!';
    } else {
      document.getElementById('msg').innerHTML = `Hit! HP: <span id="hp">${hp}</span>`;
    }
  } else {
    document.getElementById('msg').innerHTML = `Missed! Draw a square. HP: <span id="hp">${hp}</span>`;
  }
  clear_();
}

function clear_() {
  strokes = []; points = []; redraw();
}

redraw();
</script>
</body>
