<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library Game</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #6f4e3f;
    font-family: sans-serif;
    gap: 16px;
  }
  canvas {
    border: 1px solid #ffffff;
    border-radius: 16px;
    cursor: crosshair;
    background: url("background.png") center/cover;
    touch-action: none;
  }
  .controls { display: flex; gap: 12px; }
  button {
    padding: 8px 28px;
    font-size: 15px;
    border: 1px solid #555;
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
  }
  button:hover { background: rgba(255,255,255,0.05); }
  #hud { font-size: 15px; min-height: 24px; color: #fff; text-shadow: 0 0 4px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<canvas id="c" width="860" height="660"></canvas>
<div class="controls">
  <button onclick="castSpell()">Cast</button>
  <button onclick="clearDrawing()">Clear</button>
</div>
<div id="hud">Draw the required shape to defeat each enemy!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 860, H = 660;
const CX = W / 2, CY = H / 2;

let drawing = false;
let points = [];
let strokes = [];
let playerHP = 100;
let gameOver = false;
let enemies = [];
let spawnTimer = 0;
let spawnInterval = 300;
let wave = 0;

const SHAPES = ['circle', 'square', 'line', 'triangle'];
const SHAPE_COLORS = {
  circle: '#4A90D9',
  square: '#C0392B',
  line: '#9B59B6',
  triangle: '#E67E22'
};
const SHAPE_LABELS = {
  square: 'SQUARE',
  circle: 'CIRCLE',
  line: 'LINE',
  triangle: 'TRIANGLE'
};

function randomShape() {
  return SHAPES[Math.floor(Math.random() * SHAPES.length)];
}

function makeCombo() {
  const len = Math.random() < 0.5 ? 2 : 3;
  const combo = [];
  for (let i = 0; i < len; i++) combo.push(randomShape());
  return combo;
}

function spawnEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const r = 320;
  const x = CX + Math.cos(angle) * r;
  const y = CY + Math.sin(angle) * r;
  const speed = 0.35 + Math.random() * 0.2 + wave * 0.05;

  // ~30% chance of combo enemy after wave 2
  const isCombo = wave > 2 && Math.random() < 0.3;

  if (isCombo) {
    const combo = makeCombo();
    enemies.push({
      x, y, speed, size: 38,
      hit: 0, dead: false, deadTimer: 0,
      isCombo: true,
      combo,           // full list e.g. ['circle','square','triangle']
      comboIndex: 0,   // which shape needs to be drawn next
      shape: combo[0]  // current required shape (used by drawEnemyShape)
    });
  } else {
    const shape = randomShape();
    enemies.push({
      x, y, shape, speed, size: 34,
      hit: 0, dead: false, deadTimer: 0,
      isCombo: false
    });
  }
}

// Draw small shape icons for the combo sequence above the enemy
function drawComboIndicator(e) {
  if (!e.isCombo) return;
  const iconSize = 13;
  const gap = 4;
  const total = e.combo.length * (iconSize + gap) - gap;
  let sx = e.x - total / 2;
  const sy = e.y - e.size / 2 - 22;

  e.combo.forEach((shape, idx) => {
    const cx = sx + iconSize / 2;
    const cy = sy + iconSize / 2;
    ctx.save();
    ctx.globalAlpha = e.dead ? Math.max(0, e.deadTimer / 20) : 1;

    // Done shapes: faded with checkmark tint; current: bright; upcoming: dim
    if (idx < e.comboIndex) {
      ctx.globalAlpha *= 0.35;
    } else if (idx === e.comboIndex) {
      // pulsing bright border
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 6;
    } else {
      ctx.globalAlpha *= 0.55;
    }

    ctx.fillStyle = SHAPE_COLORS[shape];
    ctx.strokeStyle = idx === e.comboIndex ? '#fff' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;

    if (shape === 'square') {
      ctx.beginPath();
      ctx.roundRect(cx - iconSize/2, cy - iconSize/2, iconSize, iconSize, 2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'circle') {
      ctx.beginPath();
      ctx.arc(cx, cy, iconSize/2, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'line') {
      ctx.beginPath();
      ctx.roundRect(cx - iconSize/2, cy - iconSize*0.28, iconSize, iconSize*0.56, 2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(cx, cy - iconSize/2);
      ctx.lineTo(cx + iconSize/2, cy + iconSize/2);
      ctx.lineTo(cx - iconSize/2, cy + iconSize/2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    ctx.restore();
    sx += iconSize + gap;
  });
}

function drawEnemyShape(e) {
  const { x, y, size, shape, hit } = e;
  const pulse = hit > 0 ? 1 + Math.sin(hit * 0.4) * 0.18 : 1;
  const s = size * pulse;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = e.dead ? Math.max(0, e.deadTimer / 20) : 1;

  // Combo enemies get a glowing double-ring outline
  if (e.isCombo) {
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, s / 2 + 8, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.fillStyle = SHAPE_COLORS[shape];
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;

  if (shape === 'square') {
    ctx.beginPath();
    ctx.roundRect(-s/2, -s/2, s, s, 5);
    ctx.fill(); ctx.stroke();
  } else if (shape === 'circle') {
    ctx.beginPath();
    ctx.arc(0, 0, s/2, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  } else if (shape === 'line') {
    ctx.beginPath();
    ctx.roundRect(-s/2, -s*0.28, s, s*0.56, 5);
    ctx.fill(); ctx.stroke();
  } else if (shape === 'triangle') {
    ctx.beginPath();
    ctx.moveTo(0, -s/2);
    ctx.lineTo(s/2, s/2);
    ctx.lineTo(-s/2, s/2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(s * 0.32)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const label = { square: '□', circle: '○', line: '—', triangle: '△' }[shape];
  ctx.fillText(label, 0, shape === 'triangle' ? s * 0.1 : 0);
  ctx.restore();

  drawComboIndicator(e);
}

function drawPlayer() {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.fillStyle = '#4A90D9';
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✦', 0, 1);
  ctx.restore();
}

function drawPlayerHPBar() {
  const bw = 200, bh = 16;
  const bx = (W - bw) / 2, by = H - 36;
  ctx.fillStyle = 'rgba(80,80,80,0.4)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 6); ctx.fill();
  const pct = playerHP / 100;
  ctx.fillStyle = playerHP > 50 ? '#27AE60' : playerHP > 25 ? '#E67E22' : '#C0392B';
  ctx.beginPath(); ctx.roundRect(bx, by, bw * pct, bh, 6); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Player HP: ${playerHP}/100`, bx + bw/2, by + 8);
}

function drawHUD() {
  const e = enemies.find(e => !e.dead);
  if (e && !gameOver) {
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    if (e.isCombo) {
      const remaining = e.combo.slice(e.comboIndex);
      const text = 'Draw: ' + remaining.map(s => SHAPE_LABELS[s]).join(' + ');
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('⚡ COMBO ENEMY — ' + text, W/2, 10);
    } else {
      ctx.fillStyle = SHAPE_COLORS[e.shape];
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('Draw a ' + SHAPE_LABELS[e.shape], W/2, 10);
    }
  }
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 32px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Game Over', W/2, H/2 - 20);
    ctx.font = '18px sans-serif';
    ctx.fillText('Refresh to play again', W/2, H/2 + 20);
  }
}

function drawUserStrokes() {
  const all = strokes.flat().concat(points);
  let color = '#4A90D9';
  if (all.length >= 8) {
    if (looksLikeSquare(all) || looksLikeCircle(all) || looksLikeLine(all) || looksLikeTriangle(all)) color = '#3BBA4C';
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 3.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  strokes.forEach(s => {
    ctx.beginPath();
    s.forEach((p, i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
  });
  if (points.length > 1) {
    ctx.beginPath();
    points.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  if (!gameOver) {
    spawnTimer++;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      wave++;
      spawnEnemy();
      if (spawnInterval > 140) spawnInterval -= 5;
    }

    enemies.forEach(e => {
      if (e.dead) { e.deadTimer--; return; }
      const dx = CX - e.x, dy = CY - e.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 26) {
        playerHP = Math.max(0, playerHP - 20);
        e.dead = true;
        e.deadTimer = 20;
        if (playerHP <= 0) { playerHP = 0; gameOver = true; }
        document.getElementById('hud').textContent = `Enemy reached you! HP: ${playerHP}`;
        return;
      }
      e.x += (dx / dist) * e.speed;
      e.y += (dy / dist) * e.speed;
      if (e.hit > 0) e.hit--;
    });

    enemies = enemies.filter(e => !e.dead || e.deadTimer > 0);
  }

  enemies.forEach(drawEnemyShape);
  drawPlayer();
  drawPlayerHPBar();
  drawUserStrokes();
  drawHUD();

  requestAnimationFrame(loop);
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  if (e.touches) return { x: (e.touches[0].clientX - r.left)*scaleX, y: (e.touches[0].clientY - r.top)*scaleY };
  return { x: (e.clientX - r.left)*scaleX, y: (e.clientY - r.top)*scaleY };
}

canvas.addEventListener('mousedown', e => { drawing=true; points=[getPos(e)]; });
canvas.addEventListener('mousemove', e => { if (!drawing) return; points.push(getPos(e)); });
canvas.addEventListener('mouseup', () => { if (points.length>1) strokes.push([...points]); drawing=false; points=[]; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; points=[getPos(e)]; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; points.push(getPos(e)); });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (points.length>1) strokes.push([...points]); drawing=false; points=[]; });

function looksLikeSquare(all) {
  if (all.length < 10) return false;
  const xs = all.map(p => p.x), ys = all.map(p => p.y);
  const w = Math.max(...xs) - Math.min(...xs), h = Math.max(...ys) - Math.min(...ys);
  const ratio = Math.min(w, h) / Math.max(w, h);
  
  if (w < 20 || h < 20 || ratio < 0.5) return false;

  // Reduced variance check: squares are actually quite "even"
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
  const dists = all.map(p => Math.hypot(p.x - cx, p.y - cy));
  const avgD = dists.reduce((a, b) => a + b, 0) / dists.length;
  const variance = dists.reduce((a, b) => a + Math.abs(b - avgD), 0) / dists.length;

  // Squares usually fall between 0.1 and 0.25 variance
  if (variance / avgD < 0.05) return false; 

  return true; 
}

function looksLikeCircle(all) {
  if (all.length < 10) return false;
  const xs = all.map(p => p.x), ys = all.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const w = maxX - minX, h = maxY - minY;
  
  // 1. Check Aspect Ratio (Circles should be roughly square-ish)
  const ratio = Math.min(w, h) / Math.max(w, h);
  if (ratio < 0.6) return false;

  // 2. Check Variance (How much do points deviate from a center?)
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const dists = all.map(p => Math.hypot(p.x - cx, p.y - cy));
  const avgD = dists.reduce((a, b) => a + b, 0) / dists.length;
  const variance = dists.reduce((a, b) => a + Math.abs(b - avgD), 0) / dists.length;

  // Circles have very low variance (all points are roughly same distance from center)
  // 0.2 is a "forgiving" threshold for hand-drawn circles
  return (variance / avgD < 0.2); 
}

function looksLikeLine(all) {
  if (all.length < 6) return false;
  const xs=all.map(p=>p.x), ys=all.map(p=>p.y);
  const w=Math.max(...xs)-Math.min(...xs);
  const h=Math.max(...ys)-Math.min(...ys);
  if (w < 60) return false;
  return h/w < 0.35;
}

function looksLikeTriangle(all) {
  if (all.length < 10) return false;
  const xs = all.map(p => p.x), ys = all.map(p => p.y);
  const w = Math.max(...xs) - Math.min(...xs), h = Math.max(...ys) - Math.min(...ys);
  if (w < 20 || h < 20) return false;

  // A triangle has much higher variance than a circle or square
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
  const dists = all.map(p => Math.hypot(p.x - cx, p.y - cy));
  const avgD = dists.reduce((a, b) => a + b, 0) / dists.length;
  const variance = dists.reduce((a, b) => a + Math.abs(b - avgD), 0) / dists.length;

  return (variance / avgD > 0.15); // Triangles are "unbalanced" compared to circles
}

function detectShape(all) {
  if (looksLikeLine(all)) return 'line';
  if (looksLikeTriangle(all)) return 'triangle';
    if (looksLikeSquare(all)) return 'square';
  if (looksLikeCircle(all)) return 'circle';
  return null;
}

// For combo enemies: player draws ALL shapes separated by lifts (multiple strokes).
// Each stroke is matched in order against the combo sequence.
// castSpell checks that all strokes match combo[0], combo[1], ... in order.
function castSpell() {
  if (gameOver) return;
  if (strokes.length === 0) { document.getElementById('hud').textContent = 'Draw a shape first!'; return; }

  const target = enemies.find(e => !e.dead);
  if (!target) { document.getElementById('hud').textContent = 'No enemies!'; clearDrawing(); return; }

  if (!target.isCombo) {
    // Normal enemy: one stroke
    const all = strokes.flat();
    const detected = detectShape(all);
    if (detected === target.shape) {
      target.dead = true;
      target.deadTimer = 20;
      document.getElementById('hud').textContent = 'Enemy defeated!';
    } else {
      document.getElementById('hud').textContent = `Wrong shape! Draw a ${SHAPE_LABELS[target.shape]}`;
    }
  } else {
    // Combo enemy: need exactly combo.length strokes, each matching in order
    const combo = target.combo;
    if (strokes.length < combo.length) {
      const remaining = combo.length - strokes.length;
      document.getElementById('hud').textContent =
        `Combo needs ${combo.length} shapes! Draw ${remaining} more.`;
      clearDrawing();
      return;
    }

    let allMatch = true;
    for (let i = 0; i < combo.length; i++) {
      const detected = detectShape(strokes[i]);
      if (detected !== combo[i]) {
        allMatch = false;
        document.getElementById('hud').textContent =
          `Shape ${i+1} was wrong! Needed ${SHAPE_LABELS[combo[i]]}, got ${detected ? SHAPE_LABELS[detected] : 'nothing'}`;
        break;
      }
    }

    if (allMatch) {
      target.dead = true;
      target.deadTimer = 20;
      document.getElementById('hud').textContent = '⚡ COMBO DEFEATED!';
    }
  }

  clearDrawing();
}

function clearDrawing() {
  strokes = []; points = [];
}

loop();
</script>
</body>
</html>
