<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Library Game</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    background: #6f4e3f;
    font-family: sans-serif;
    gap: 16px;
  }
  canvas {
    border: 1px solid #ffffff;
    border-radius: 16px;
    cursor: crosshair;
    background: #2b1d16;
    touch-action: none;
  }
  .controls { display: flex; gap: 12px; }
  button {
    padding: 8px 28px;
    font-size: 15px;
    border: 1px solid #fff;
    border-radius: 8px;
    background: transparent;
    color: #fff;
    cursor: pointer;
  }
  button:hover { background: rgba(255,255,255,0.1); }
  #hud { font-size: 15px; min-height: 24px; color: #fff; text-shadow: 0 0 4px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<canvas id="c" width="860" height="660"></canvas>
<div class="controls">
  <button onclick="castSpell()">Cast</button>
  <button onclick="clearDrawing()">Clear</button>
</div>
<div id="hud">Draw the required shape to defeat each enemy!</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const W = 860, H = 660;
const CX = W / 2, CY = H / 2;

let drawing = false;
let points = [];
let strokes = [];
let playerHP = 100;
let gameOver = false;
let enemies = [];
let spawnTimer = 0;
let spawnInterval = 300;
let wave = 0;
let level = 1;
let showingLevel1 = true;
let showingLevel2 = false;
let levelScreenTimer = 0;
let level2Started = false;
let enemyKillCount = 0;
let bossSpawned = false;
const LEVEL_SCREEN_DURATION = 180;

const SHAPES = ['circle', 'square', 'line', 'triangle'];
const SHAPE_COLORS = {
  circle: '#4A90D9',
  square: '#C0392B',
  line: '#9B59B6',
  triangle: '#E67E22'
};
const SHAPE_LABELS = {
  square: 'SQUARE',
  circle: 'CIRCLE',
  line: 'LINE',
  triangle: 'TRIANGLE'
};

function randomShape() {
  return SHAPES[Math.floor(Math.random() * SHAPES.length)];
}

function makeCombo(length = 2) {
  const combo = [];
  for (let i = 0; i < length; i++) combo.push(randomShape());
  return combo;
}

function spawnEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const r = 320;
  const x = CX + Math.cos(angle) * r;
  const y = CY + Math.sin(angle) * r;
  const speed = 0.35 + Math.random() * 0.2 + wave * 0.05;

  const isCombo = wave > 2 && Math.random() < 0.3;

  if (isCombo) {
    const combo = makeCombo(Math.random() < 0.5 ? 2 : 3);
    enemies.push({
      x, y, speed, size: 38,
      hit: 0, dead: false, deadTimer: 0,
      isCombo: true, isBoss: false,
      combo,
      comboIndex: 0,
      shape: combo[0]
    });
  } else {
    const shape = randomShape();
    enemies.push({
      x, y, shape, speed, size: 34,
      hit: 0, dead: false, deadTimer: 0,
      isCombo: false, isBoss: false
    });
  }
}

function spawnBoss() {
  bossSpawned = true;
  const angle = Math.random() * Math.PI * 2;
  const r = 340;
  const x = CX + Math.cos(angle) * r;
  const y = CY + Math.sin(angle) * r;
  
  const speed = 0.25; 
  const combo = makeCombo(4);

  enemies.push({
    x, y, speed, size: 65,
    hit: 0, dead: false, deadTimer: 0,
    isCombo: true,
    isBoss: true,
    combo,
    comboIndex: 0,
    shape: combo[0]
  });
}

function drawComboIndicator(e) {
  if (!e.isCombo) return;
  const iconSize = e.isBoss ? 16 : 13;
  const gap = 5;
  const total = e.combo.length * (iconSize + gap) - gap;
  let sx = e.x - total / 2;
  const sy = e.y - e.size / 2 - (e.isBoss ? 30 : 22);

  e.combo.forEach((shape, idx) => {
    const cx = sx + iconSize / 2;
    const cy = sy + iconSize / 2;
    ctx.save();
    ctx.globalAlpha = e.dead ? Math.max(0, e.deadTimer / 20) : 1;

    if (idx < e.comboIndex) {
      ctx.globalAlpha *= 0.2;
    } else if (idx === e.comboIndex) {
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
    } else {
      ctx.globalAlpha *= 0.55;
    }

    ctx.fillStyle = SHAPE_COLORS[shape];
    ctx.strokeStyle = idx === e.comboIndex ? '#fff' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;

    if (shape === 'square') {
      ctx.beginPath();
      ctx.roundRect(cx - iconSize/2, cy - iconSize/2, iconSize, iconSize, 2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'circle') {
      ctx.beginPath();
      ctx.arc(cx, cy, iconSize/2, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'line') {
      ctx.beginPath();
      ctx.roundRect(cx - iconSize/2, cy - iconSize*0.28, iconSize, iconSize*0.56, 2);
      ctx.fill(); ctx.stroke();
    } else if (shape === 'triangle') {
      ctx.beginPath();
      ctx.moveTo(cx, cy - iconSize/2);
      ctx.lineTo(cx + iconSize/2, cy + iconSize/2);
      ctx.lineTo(cx - iconSize/2, cy + iconSize/2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    ctx.restore();
    sx += iconSize + gap;
  });
}

function drawEnemyShape(e) {
  const { x, y, size, shape, hit } = e;
  const pulse = hit > 0 ? 1 + Math.sin(hit * 0.4) * 0.18 : 1;
  const s = size * pulse;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = e.dead ? Math.max(0, e.deadTimer / 20) : 1;

  if (e.isBoss) {
    ctx.strokeStyle = (Math.floor(Date.now() / 150) % 2 === 0) ? '#FF1493' : '#FFD700';
    ctx.lineWidth = 6;
    ctx.shadowColor = '#FF0000';
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(0, 0, s / 2 + 10, 0, Math.PI * 2);
    ctx.stroke();
  } else if (e.isCombo) {
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, s / 2 + 8, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.fillStyle = SHAPE_COLORS[shape];
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = e.isBoss ? 4 : 2;

  if (shape === 'square') {
    ctx.beginPath();
    ctx.roundRect(-s/2, -s/2, s, s, 5);
    ctx.fill(); ctx.stroke();
  } else if (shape === 'circle') {
    ctx.beginPath();
    ctx.arc(0, 0, s/2, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
  } else if (shape === 'line') {
    ctx.beginPath();
    ctx.roundRect(-s/2, -s*0.28, s, s*0.56, 5);
    ctx.fill(); ctx.stroke();
  } else if (shape === 'triangle') {
    ctx.beginPath();
    ctx.moveTo(0, -s/2);
    ctx.lineTo(s/2, s/2);
    ctx.lineTo(-s/2, s/2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${Math.round(s * 0.35)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const label = { square: '□', circle: '○', line: '—', triangle: '△' }[shape];
  ctx.fillText(label, 0, shape === 'triangle' ? s * 0.1 : 0);
  ctx.restore();

  drawComboIndicator(e);
}

function drawPlayer() {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.fillStyle = '#4A90D9';
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✦', 0, 1);
  ctx.restore();
}

function drawPlayerHPBar() {
  const bw = 200, bh = 16;
  const bx = (W - bw) / 2, by = H - 36;
  ctx.fillStyle = 'rgba(80,80,80,0.4)';
  ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 6); ctx.fill();
  const pct = playerHP / 100;
  ctx.fillStyle = playerHP > 50 ? '#27AE60' : playerHP > 25 ? '#E67E22' : '#C0392B';
  ctx.beginPath(); ctx.roundRect(bx, by, bw * pct, bh, 6); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`Player HP: ${playerHP}/100`, bx + bw/2, by + 8);
}

function drawHUD() {
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  const targetGoal = level === 1 ? 5 : 10;

  ctx.fillText(`Level: ${level}`, 12, 10);
  if (bossSpawned) {
    ctx.fillStyle = '#FF3366';
    ctx.fillText(`Score: BOSS WAVE!`, 12, 30);
  } else {
    ctx.fillText(`Score: ${enemyKillCount}/${targetGoal}`, 12, 30);
  }

  const e = enemies.find(e => !e.dead);

  if (e && !gameOver) {
    ctx.textAlign = 'center';
    if (e.isBoss) {
      const remaining = e.combo.slice(e.comboIndex);
      const text = remaining.map(s => SHAPE_LABELS[s]).join(' ➔ ');
      ctx.fillStyle = '#FF3366';
      ctx.font = 'bold 16px sans-serif';
      ctx.fillText("BOSS ENEMY — CAST: " + text, W / 2, 15);
    } else if (e.isCombo) {
      const remaining = e.combo.slice(e.comboIndex);
      const text = remaining.map(s => SHAPE_LABELS[s]).join(' + ');
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('COMBO ENEMY — Draw: ' + text, W / 2, 10);
    } else {
      ctx.fillStyle = SHAPE_COLORS[e.shape];
      ctx.font = 'bold 14px sans-serif';
      ctx.fillText('Draw a ' + SHAPE_LABELS[e.shape], W / 2, 10);
    }
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 34px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Game Over', W/2, H/2 - 20);
    ctx.font = '18px sans-serif';
    ctx.fillText('Refresh to play again', W/2, H/2 + 20);
  }
}

function drawLevelScreen(title, subtitle) {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 42px sans-serif';
  ctx.fillText(title, W / 2, H / 2 - 30);
  ctx.font = '20px sans-serif';
  ctx.fillText(subtitle, W / 2, H / 2 + 15);
}

function drawUserStrokes() {
  const all = strokes.flat().concat(points);
  let color = '#4A90D9';
  if (all.length >= 6) {
    if (detectShape(all)) color = '#3BBA4C';
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 3.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  strokes.forEach(s => {
    ctx.beginPath();
    s.forEach((p, i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
  });
  if (points.length > 1) {
    ctx.beginPath();
    points.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
    ctx.stroke();
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  if (showingLevel1) {
    drawLevelScreen('Level 1', 'Defeat 4 Minions + The Guardian Boss');
    levelScreenTimer++;
    if (levelScreenTimer >= LEVEL_SCREEN_DURATION) showingLevel1 = false;
    requestAnimationFrame(loop);
    return;
  }

  if (showingLevel2) {
    drawLevelScreen('Level 2', 'Defeat 9 Fast Minions + Final Overlord Boss');
    levelScreenTimer++;
    if (levelScreenTimer >= LEVEL_SCREEN_DURATION) showingLevel2 = false;
    requestAnimationFrame(loop);
    return;
  }

  if (!gameOver) {
    const goal = level === 1 ? 5 : 10;

    const readyForBoss = (enemyKillCount === goal - 1);

    if (readyForBoss && !bossSpawned && enemies.length === 0) {
      spawnBoss();
    }

    // Only spawn standard enemies if the boss isn't here yet and we aren't waiting for the boss trigger
    if (!bossSpawned && !readyForBoss) {
      spawnTimer++;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        wave++;
        spawnEnemy();
        if (spawnInterval > 140) spawnInterval -= 6;
      }
    }

    if (enemyKillCount >= 5 && !level2Started) {
      level = 2;
      enemyKillCount = 0;
      bossSpawned = false;
      level2Started = true;
      showingLevel2 = true;
      levelScreenTimer = 0;
      enemies = [];
    } else if (enemyKillCount >= 10 && level2Started) {
      ctx.clearRect(0, 0, W, H);
      drawLevelScreen('VICTORY!', 'You cleared all levels successfully!');
      return;
    }

    enemies.forEach(e => {
      if (e.dead) { e.deadTimer--; return; }
      const dx = CX - e.x, dy = CY - e.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 26) {
        playerHP = Math.max(0, playerHP - (e.isBoss ? 40 : 20));
        e.dead = true;
        e.deadTimer = 20;
        if (playerHP <= 0) { playerHP = 0; gameOver = true; }
        document.getElementById('hud').textContent = e.isBoss ? 'The Boss struck you!' : `Enemy reached you!`;
        return;
      }
      e.x += (dx / dist) * e.speed;
      e.y += (dy / dist) * e.speed;
      if (e.hit > 0) e.hit--;
    });

    enemies = enemies.filter(e => !e.dead || e.deadTimer > 0);
  }

  enemies.forEach(drawEnemyShape);
  drawPlayer();
  drawPlayerHPBar();
  drawUserStrokes();
  drawHUD();

  requestAnimationFrame(loop);
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = W / r.width;
  const scaleY = H / r.height;
  if (e.touches) return { x: (e.touches[0].clientX - r.left)*scaleX, y: (e.touches[0].clientY - r.top)*scaleY };
  return { x: (e.clientX - r.left)*scaleX, y: (e.clientY - r.top)*scaleY };
}

canvas.addEventListener('mousedown', e => { drawing=true; points=[getPos(e)]; });
canvas.addEventListener('mousemove', e => { if (!drawing) return; points.push(getPos(e)); });
canvas.addEventListener('mouseup', () => { if (points.length>1) strokes.push([...points]); drawing=false; points=[]; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; points=[getPos(e)]; });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; points.push(getPos(e)); });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (points.length>1) strokes.push([...points]); drawing=false; points=[]; });

// ROBUST GEOMETRIC SHAPE ENGINE
function detectShape(all) {
  if (all.length < 6) return null;

  const xs = all.map(p => p.x), ys = all.map(p => p.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const w = maxX - minX, h = maxY - minY;
  
  if (w < 15 && h < 15) return null;

  if (w >= 45 && h / w < 0.35) return 'line';

  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;

  const radiusEst = (w + h) / 4;
  let circleDeviationSum = 0;
  all.forEach(p => {
    const d = Math.hypot(p.x - cx, p.y - cy);
    circleDeviationSum += Math.abs(d - radiusEst);
  });
  const circleError = circleDeviationSum / all.length / radiusEst;

  const aspect = Math.min(w, h) / Math.max(w, h);
  if (aspect > 0.65 && circleError < 0.18) {
    return 'circle';
  }

  const topHalfPoints = all.filter(p => p.y < minY + h * 0.3);
  const bottomHalfPoints = all.filter(p => p.y > maxY - h * 0.3);
  
  let topWidth = 0, bottomWidth = 0;
  if (topHalfPoints.length > 0) {
    const txs = topHalfPoints.map(p => p.x);
    topWidth = Math.max(...txs) - Math.min(...txs);
  }
  if (bottomHalfPoints.length > 0) {
    const bxs = bottomHalfPoints.map(p => p.x);
    bottomWidth = Math.max(...bxs) - Math.min(...bxs);
  }

  if (bottomWidth > 0 && topWidth / bottomWidth < 0.45 && aspect > 0.5) {
    return 'triangle';
  }

  if (aspect > 0.6 && circleError >= 0.15) {
    return 'square';
  }

  if (aspect > 0.5) {
    return circleError < 0.23 ? 'circle' : 'square';
  }

  return null;
}

function castSpell() {
  if (gameOver) return;
  if (strokes.length === 0) { document.getElementById('hud').textContent = 'Draw a shape first!'; return; }

  const target = enemies.find(e => !e.dead);
  if (!target) { document.getElementById('hud').textContent = 'No enemies!'; clearDrawing(); return; }

  const allCurrentPoints = strokes.flat();
  const detected = detectShape(allCurrentPoints);

  if (!target.isCombo) {
    if (detected === target.shape) {
      target.dead = true;
      target.deadTimer = 20;
      document.getElementById('hud').textContent = 'Enemy defeated!';
      enemyKillCount++;
    } else {
      document.getElementById('hud').textContent = `Wrong shape! Draw a ${SHAPE_LABELS[target.shape]}`;
    }
  } else {
    const requiredShape = target.combo[target.comboIndex];
    
    if (detected === requiredShape) {
      target.comboIndex++;
      target.hit = 15;
      
      if (target.comboIndex >= target.combo.length) {
        target.dead = true;
        target.deadTimer = 20;
        enemyKillCount++;
        document.getElementById('hud').textContent = target.isBoss ? 'BOSS DESTROYED!' : 'COMBO DEFEATED!';
      } else {
        target.shape = target.combo[target.comboIndex];
        document.getElementById('hud').textContent = `Good hit! ${target.combo.length - target.comboIndex} shapes remaining!`;
      }
    } else {
      document.getElementById('hud').textContent = `Incorrect combo shape! Needed ${SHAPE_LABELS[requiredShape]}`;
    }
  }

  clearDrawing();
}

function clearDrawing() {
  strokes = []; points = [];
}

loop();
</script>
</body>
</html>
